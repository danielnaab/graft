graft: backlog
inputs:
  materials:
    - { path: "../../sources/external/jira/latest/issues.json", rev: HEAD }
derivations:
  - id: normalize
    transformer: { ref: csv-tools, params: { mode: "jira->yaml" } }
    template: { source: inline, engine: none, content_type: application/json, persist: never }
    outputs:
      - { path: "./backlog.yaml", schema: backlog }
    policy: { deterministic: true, attest: required }
