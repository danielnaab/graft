graft: sprint-brief
inputs:
  materials:
    # Product roadmap provides strategic direction
    - { path: "../../sources/roadmap/2025-Q1.md", rev: HEAD }
    # Backlog provides current sprint work items
    - { path: "../backlog/backlog.yaml", rev: HEAD }
derivations:
  - id: brief
    transformer: { ref: report-md, params: { title: "Sprint Brief" } }
    template:
      source: file
      engine: jinja2
      content_type: text/markdown
      file: "./template.md"
      persist: text
      persist_path: "./.graft/evaluated/brief-input.md"
    outputs:
      - { path: "./brief.md", schema: sprint_brief }
    policy:
      deterministic: true
      attest: required
      direct_edit: true
