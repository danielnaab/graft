name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.14
      - run: uv venv
      - run: source .venv/bin/activate && uv pip install -e ".[test]"
      - run: source .venv/bin/activate && pytest -q
